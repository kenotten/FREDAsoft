name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Ensure Rollup platform optional deps
        run: npm rebuild rollup

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
